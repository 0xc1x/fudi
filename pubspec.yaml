name: fudi
description: "Fudi - Food rescue app. Pickup-only deals from local businesses."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.2

  # Backend
  supabase_flutter: ^2.12.4

  # Observabilidad
  sentry_flutter: ^9.19.0

  # Analytics
  firebase_core: ^4.7.0
  firebase_analytics: ^11.3.3
  mixpanel_flutter: ^2.2.0

  # Maps
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.2.4
  smooth_page_indicator: ^1.2.0
  cupertino_icons: ^1.0.8

  # Utils
  internet_connection_checker_plus: ^2.5.2
  intl: ^0.20.2
  uuid: ^4.5.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.0.0
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env.dev
    - .env.staging
    - .env.prod
