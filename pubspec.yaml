name: fudi
description: "Fudi - Food rescue app. Pickup-only deals from local businesses."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.2

  # Backend
  supabase_flutter: ^2.12.4

  # Push notifications
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^18.0.1

  # Observabilidad
  sentry_flutter: ^9.21.0

  # Analytics
  firebase_core: ^4.7.0
  firebase_analytics: ^12.3.0
  mixpanel_flutter: ^2.2.0

  # Maps
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.2.4
  smooth_page_indicator: ^2.0.1
  cupertino_icons: ^1.0.8
  meta: ^1.17.0
  state_notifier: ^1.0.0

  # Utils
  internet_connection_checker_plus: ^3.0.0
  intl: ^0.20.2
  uuid: ^4.5.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_dotenv: ^6.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.0.0
  dio: ^5.9.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.2
  geocoding: ^4.0.0
  lucide_icons: ^0.257.0

dev_dependencies:
  sentry_dart_plugin: ^3.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env.dev
    - .env.staging
    - assets/images/
    - assets/svgs/
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-VariableFont_wght.ttf
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/DMSans-Italic-VariableFont_opsz,wght.ttf
          style: italic


sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: xcix
