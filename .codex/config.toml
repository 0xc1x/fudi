[mcp_servers.github]
command = "node"
args = ["./.ai/mcp/launchers/github.mjs"]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]
enabled = true

[mcp_servers.supabase-db]
command = "node"
args = ["./.ai/mcp/launchers/supabase-postgres.mjs"]
env_vars = ["SUPABASE_DB_URL"]
enabled = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
enabled = true
