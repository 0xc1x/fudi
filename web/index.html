<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="rolé  — Rescata comida de negocios locales a precios increíbles.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="rolé">
  <meta name="theme-color" content="#FA4743">
  <meta name="background-color" content="#FA4743">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>rolé — Rescata Comida</title>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCb9rhIBntRpLfic7-qVtCW7hcY6Db-QGI"></script>

  <style>
    body { background-color: #FA4743; margin: 0; font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif; }
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #FDFBF7;
    }
    .loading-logo {
      width: 80vw;
      max-width: 320px;
      height: auto;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease-out forwards;
    }
    .loading-tagline {
      margin-top: 16px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.5px;
      opacity: 0.8;
      opacity: 0;
      animation: fadeInUp 0.8s ease-out 0.3s forwards;
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    /* Background pattern matching Flutter splash */
    .loading-container::before {
      content: '';
      position: fixed;
      top: -50px; left: -40px;
      width: 280px; height: 280px;
      background: url('icons/Icon-maskable-192.png') center/contain no-repeat;
      opacity: 0.08;
      transform: rotate(0.2rad);
      pointer-events: none;
    }
    .loading-container::after {
      content: '';
      position: fixed;
      top: 100px; right: -80px;
      width: 320px; height: 320px;
      background: url('icons/Icon-maskable-192.png') center/contain no-repeat;
      opacity: 0.08;
      transform: rotate(-0.4rad);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading">
    <img class="loading-logo" src="icons/Icon-maskable-192.png" alt="rolé" />
    <div class="loading-tagline">Buena comida, mejores decisiones</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
