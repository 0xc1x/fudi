<!doctype html>

<html>
    <head>
        <base href="$FLUTTER_BASE_HREF" />

        <meta charset="UTF-8" />

        <meta content="IE=Edge" http-equiv="X-UA-Compatible" />

        <meta
            name="description"
            content="rolé - Rescata comida de negocios locales a precios increibles."
        />

        <meta name="mobile-web-app-capable" content="yes" />

        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />

        <meta name="apple-mobile-web-app-title" content="rolé" />

        <meta name="theme-color" content="#FA4743" />

        <meta name="background-color" content="#FA4743" />

        <link rel="apple-touch-icon" href="icons/Icon-192.png" />

        <link rel="icon" type="image/png" href="favicon.png" />

        <link rel="manifest" href="manifest.json" />

        <title>rolé - Rescata Comida</title>

        <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCb9rhIBntRpLfic7-qVtCW7hcY6Db-QGI"></script>

        <style>
            body {
                background-color: #fa4743;
                margin: 0;
                overflow: hidden;
            }

            .loading-container {
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                width: 100vw;
            }

            .bg-pattern {
                position: absolute;
                pointer-events: none;
                opacity: 0.08;
                filter: brightness(0) invert(1);
                z-index: 1;
            }

            .loading-wordmark {
                position: relative;
                z-index: 2;
                width: 95vw;
                max-width: none;
                height: auto;
                display: block;
                filter: brightness(0) invert(1);
            }
        </style>
    </head>

    <body>
        <div class="loading-container" id="loading">
            <!-- Esquina superior izquierda — grande, muy salida -->
            <img
                class="bg-pattern"
                src="assets/svgs/icon.svg"
                alt=""
                style="
                    top: -60px;
                    left: -50px;
                    width: 300px;
                    transform: rotate(12deg);
                "
            />

            <!-- Borde derecho superior — mediano -->
            <img
                class="bg-pattern"
                src="assets/svgs/icon.svg"
                alt=""
                style="
                    top: 60px;
                    right: -70px;
                    width: 240px;
                    transform: rotate(-25deg);
                "
            />

            <!-- Borde izquierdo centro-alto — pequeño, más adentro -->
            <img
                class="bg-pattern"
                src="assets/svgs/icon.svg"
                alt=""
                style="
                    top: 38%;
                    left: -30px;
                    width: 160px;
                    transform: rotate(8deg);
                "
            />

            <!-- Borde derecho centro — mediano -->
            <img
                class="bg-pattern"
                src="assets/svgs/icon.svg"
                alt=""
                style="
                    top: 42%;
                    right: -50px;
                    width: 200px;
                    transform: rotate(-15deg);
                "
            />

            <!-- Esquina inferior izquierda — mediano -->
            <img
                class="bg-pattern"
                src="assets/svgs/icon.svg"
                alt=""
                style="
                    bottom: -40px;
                    left: -30px;
                    width: 220px;
                    transform: rotate(20deg);
                "
            />

            <!-- Esquina inferior derecha — grande -->
            <img
                class="bg-pattern"
                src="assets/svgs/icon.svg"
                alt=""
                style="
                    bottom: -70px;
                    right: -55px;
                    width: 290px;
                    transform: rotate(-18deg);
                "
            />

            <!-- Centro superior — pequeño, flotando -->
            <img
                class="bg-pattern"
                src="assets/svgs/icon.svg"
                alt=""
                style="
                    top: 8%;
                    left: 44%;
                    width: 120px;
                    transform: rotate(35deg);
                "
            />

            <!-- Centro inferior — pequeño -->
            <img
                class="bg-pattern"
                src="assets/svgs/icon.svg"
                alt=""
                style="
                    bottom: 10%;
                    left: 38%;
                    width: 130px;
                    transform: rotate(-40deg);
                "
            />

            <img
                class="loading-wordmark"
                src="assets/svgs/role_wordmark.svg"
                alt="rolé"
            />
        </div>

        <script src="flutter_bootstrap.js" async></script>
        <script>
          window.addEventListener('flutter-first-frame', function () {
            const loading = document.getElementById('loading');
            if (loading) {
              loading.style.opacity = '0';
              loading.style.transition = 'opacity 300ms ease-out';
              setTimeout(() => loading.remove(), 300);
            }
          });
        </script>
    </body>
</html>
