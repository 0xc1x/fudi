name: Build Android

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy .env.dev
        run: cp .env.example .env.dev

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-aab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy .env.dev
        run: cp .env.example .env.dev

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v3
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy .env.dev
        run: cp .env.example .env.dev

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 --decode > android/app/release.keystore

      - name: Build AAB with keystore
        run: |
          flutter build appbundle --release \
            --keystore android/app/release.keystore \
            --storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --key-alias "${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Upload AAB
        uses: actions/upload-artifact@v3
        with:
          name: release-aab-signed
          path: build/app/outputs/bundle/release/app-release.aab

  deploy-play-store:
    needs: build-production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v3
        with:
          name: release-aab-signed

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Install fastlane
        run: gem install fastlane -NV

      - name: Deploy to Play Store
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" | base64 -d > service_account.json
          fastlane supply \
            --aab app-release.aab \
            --track internal \
            --json_key service_account.json \
            --package_name com.fudi.app \
            --skip_upload_metadata \
            --skip_upload_images \
            --skip_upload_screenshots
